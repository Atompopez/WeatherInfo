<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
        }

        .form-container {
            margin-bottom: 20px;
        }

        label {
            font-size: 1.2em;
        }

        input {
            padding: 10px;
            font-size: 1.1em;
            margin-right: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
        }

        .error {
            color: red;
            font-size: 1.2em;
        }

        .success {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>Consulta el Clima</h1>

    <div class="form-container">
        <label for="location">Ingresa una ciudad (separa con coma para varias):</label>
        <input type="text" id="location" placeholder="Ej. Buenos Aires, Lima, Paris">
        <button onclick="getWeather()">Consultar Clima</button>
    </div>

    <div class="result" id="result"></div>

    <script>
        function getWeather() {
            const location = document.getElementById("location").value;

            if (!location) {
                document.getElementById("result").innerHTML = `<p class="error">Por favor, ingresa al menos una ciudad.</p>`;
                return;
            }

            fetch(`http://127.0.0.1:5000/api/getData?location=${location}`)
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        document.getElementById("result").innerHTML = `<p class="error">${data.message}</p>`;
                    } else {
                        let weatherInfo = '';

                        data.forEach(city => {
                            weatherInfo += `
                                <p class="success"><strong>Ciudad:</strong> ${city.ciudad}</p>
                                <p class="success"><strong>Temperatura:</strong> ${city.temperatura} °C</p>
                                <p class="success"><strong>Humedad:</strong> ${city.humedad} %</p>
                                <hr>
                            `;
                        });

                        document.getElementById("result").innerHTML = weatherInfo;
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("result").innerHTML = `<p class="error">Hubo un problema al obtener los datos.</p>`;
                });
        }
    </script>
</body>
</html>
